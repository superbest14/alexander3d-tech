<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Alexander 3D</title>
    <style>
        :root { --main: #00d4ff; --bg: #0b0b0b; --card: #161616; --text: #eee; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 120px; }
        h2 { color: var(--main); border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        /* Cart Items */
        .cart-item { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; display: flex; align-items: center; gap: 15px; position: relative; }
        .cart-item img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }
        .details { flex-grow: 1; }
        .remove-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7em; }
        
        /* Checkout Form */
        .form-box { background: var(--card); padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid #444; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; color: #fff; border: 1px solid #333; border-radius: 8px; box-sizing: border-box; }
        
        .total-box { text-align: right; font-size: 1.4em; margin: 20px 0; color: var(--main); font-weight: bold; }
        .pay-btn { background: var(--main); color: black; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 1.1em; cursor: pointer; text-transform: uppercase; }

        /* Navigation Bar */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: flex; padding: 15px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-a { flex: 1; text-align: center; text-decoration: none; color: #555; font-size: 0.8em; }
        .active { color: var(--main); }
    </style>
</head>
<body>

    <h2>Your Shopping Cart</h2>
    <div id="cart-list"></div>

    <div class="total-box">Total: <span id="total-price">£0.00</span></div>

    <div class="form-box">
        <h3 style="margin-top:0;">Shipping Details</h3>
        <input type="text" id="custName" placeholder="Full Name">
        <input type="email" id="custEmail" placeholder="Email Address">
        <input type="text" id="custAddress" placeholder="Full Delivery Address">
        <input type="text" id="custPost" placeholder="Postcode">
        <button class="pay-btn" onclick="completeOrder()">Place Order & Pay</button>
    </div>

    <nav class="nav">
        <a href="index.html" class="nav-a">🏠<br>HOME</a>
        <a href="order.html" class="nav-a active">🛒<br>CART</a>
        <a href="profile.html" class="nav-a">👤<br>PROFILE</a>
    </nav>

<script>
    function renderCart() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const container = document.getElementById('cart-list');
        let total = 0;

        if (cart.length === 0) {
            container.innerHTML = "<p style='text-align:center; color:#666;'>Your cart is empty.</p>";
            document.getElementById('total-price').innerText = "£0.00";
            return;
        }

        container.innerHTML = cart.map((item, index) => {
            total += parseFloat(item.price);
            return `
                <div class="cart-item">
                    <img src="${item.image}">
                    <div class="details">
                        <strong>${item.name}</strong><br>
                        <span style="color:var(--main)">£${item.price}</span>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${index})">REMOVE</button>
                </div>
            `;
        }).join('');

        document.getElementById('total-price').innerText = "£" + total.toFixed(2);
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
    }

    function completeOrder() {
        const name = document.getElementById('custName').value;
        const email = document.getElementById('custEmail').value;
        const address = document.getElementById('custAddress').value;
        const cart = JSON.parse(localStorage.getItem('cart')) || [];

        if (!name || !address || cart.length === 0) {
            alert("Please fill in all details and add items to cart!");
            return;
        }

        // Generate Random Order ID
        const orderID = "AT-" + Math.floor(1000 + Math.random() * 9000);

        // Prepare info for YOU (Proszę Pana)
        const orderDetails = {
            id: orderID,
            customer: name,
            email: email,
            address: address,
            items: cart,
            status: "Processing"
        };

        // SAVE ORDER TO PROFILE (For Customer Tracking)
        let myOrders = JSON.parse(localStorage.getItem('my_orders')) || [];
        myOrders.push(orderDetails);
        localStorage.setItem('my_orders', JSON.stringify(myOrders));

        // SIMULATE EMAIL TO YOU
        console.log("SENDING EMAIL TO yinyan86@gmail.com...", orderDetails);

        alert(`Thank you ${name}!\nOrder ${orderID} has been placed.\nDetails sent to your email.`);
        
        localStorage.removeItem('cart');
        window.location.href = "profile.html";
    }

    window.onload = renderCart;
</script>
</body>
</html>
