<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; padding-bottom: 120px; }
        .cart-item { background: #161616; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid #333; }
        .checkout-bar { position: fixed; bottom: 70px; left: 0; width: 100%; background: #111; padding: 15px; border-top: 1px solid #00d4ff; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <h1>Shopping Cart</h1>
    <div id="cart-list"></div>

    <div class="checkout-bar">
        <div>Total Selected: <span id="totalPrice" style="color:#00d4ff; font-weight:bold;">£0.00</span></div>
        <button onclick="checkout()" style="background:#00d4ff; border:none; padding:10px 20px; border-radius:5px; font-weight:bold;">BUY SELECTED</button>
    </div>

<script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const list = document.getElementById('cart-list');

    function renderCart() {
        list.innerHTML = cart.map((item, i) => `
            <div class="cart-item">
                <input type="checkbox" class="cart-check" data-index="${i}" onchange="updateTotal()">
                <img src="${item.images[0]}" style="width:60px; height:60px; object-fit:cover; margin: 0 15px; border-radius:8px;">
                <div style="flex-grow:1">
                    <div style="font-weight:bold">${item.name}</div>
                    <div style="font-size:0.8em; color:#888">Color: ${item.chosenColor} | Qty: ${item.chosenQty}</div>
                </div>
                <div style="font-weight:bold">£${(item.price * item.chosenQty).toFixed(2)}</div>
            </div>
        `).join('');
    }

    function updateTotal() {
        let total = 0;
        document.querySelectorAll('.cart-check:checked').forEach(checkbox => {
            const index = checkbox.dataset.index;
            total += cart[index].price * cart[index].chosenQty;
        });
        document.getElementById('totalPrice').innerText = '£' + total.toFixed(2);
    }

    renderCart();
</script>
</body>
</html>
