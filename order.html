<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Alexander 3D</title>
    <style>
        :root { --main: #00d4ff; --bg: #0b0b0b; --text: #eee; --nav-bg: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 120px; }
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .tab-item { text-align: center; text-decoration: none; color: #888; font-size: 0.75em; flex: 1; }
        .tab-item.active { color: var(--main); }
        .tab-icon { font-size: 1.8em; display: block; margin-bottom: 3px; }
        
        .item { background: #161616; padding: 15px; margin-bottom: 15px; border-radius: 15px; display: flex; align-items: center; border: 1px solid #333; }
        .pay-section { position: fixed; bottom: 70px; left: 0; width: 100%; background: #111; padding: 15px; border-top: 1px solid var(--main); text-align: center; }
        .pay-btn { background: #ffc439; color: #000; border: none; padding: 12px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Your Cart</h1>
    <div id="cart-items"></div>

    <div class="pay-section">
        <div style="margin-bottom:10px;">Total: <span id="total" style="font-weight:bold; color:var(--main);">£0.00</span></div>
        <button class="pay-btn">PAY WITH PAYPAL / CARD</button>
    </div>

    <nav class="tab-bar">
        <a href="index.html" class="tab-item"><span class="tab-icon">🏠</span>HOME</a>
        <a href="order.html" class="tab-item active"><span class="tab-icon">🛒</span>CART</a>
        <a href="profile.html" class="tab-item"><span class="tab-icon">👤</span>PROFILE</a>
    </nav>
    </body>
</html>
