<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; }
        .item { background: #1a1a1a; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; border-radius: 10px; }
        .checkout-box { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; padding: 20px; border-top: 2px solid #00d4ff; box-sizing: border-box; }
        .pay-btn { background: #ffc439; color: black; padding: 15px; border-radius: 5px; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <h1>Shopping Cart</h1>
    <div id="cart-items"></div>

    <div class="checkout-box">
        <div style="font-size: 1.5em; margin-bottom: 10px;">Selected Total: <span id="total">£0.00</span></div>
        <form id="paypal-form" action="https://www.paypal.com/cgi-bin/webscr" method="post">
            <input type="hidden" name="cmd" value="_xclick">
            <input type="hidden" name="business" value="yinyan86@gmail.com">
            <input type="hidden" name="currency_code" value="GBP">
            <input type="hidden" name="item_name" id="pp_items">
            <input type="hidden" name="amount" id="pp_amount">
            <button class="pay-btn" onclick="return placeOrder()">CHECKOUT WITH PAYPAL / CARD</button>
        </form>
    </div>

<script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    function renderCart() {
        const div = document.getElementById('cart-items');
        div.innerHTML = cart.map((item, i) => `
            <div class="item">
                <input type="checkbox" onchange="calcTotal()" class="cart-check" data-price="${item.price}" data-name="${item.name}">
                <img src="${item.images[0]}" style="width:50px; margin: 0 15px;">
                <div style="flex-grow:1">${item.name}</div>
                <div>£${item.price}</div>
            </div>
        `).join('');
    }

    function calcTotal() {
        let total = 0;
        document.querySelectorAll('.cart-check:checked').forEach(c => total += parseFloat(c.dataset.price));
        document.getElementById('total').innerText = '£' + total.toFixed(2);
    }

    function placeOrder() {
        let selected = [];
        document.querySelectorAll('.cart-check:checked').forEach(c => selected.push(c.dataset.name));
        if(selected.length === 0) return false;

        const amount = document.getElementById('total').innerText.replace('£','');
        document.getElementById('pp_items').value = selected.join(', ');
        document.getElementById('pp_amount').value = amount;

        // Create order in history
        let orders = JSON.parse(localStorage.getItem('orders')) || [];
        orders.push({ id: "AT-"+Math.random().toString(36).substr(2,5), items: selected, price: amount, status: "Order Placed", date: new Date().toLocaleDateString() });
        localStorage.setItem('orders', JSON.stringify(orders));
        return true;
    }
    renderCart();
</script>
</body>
</html>
