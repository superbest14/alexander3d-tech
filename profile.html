<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Alexander 3D</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main: #00d4ff; --bg: #0b0b0b; --card: #161616; --text: #eee; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 100px; }
        
        .header { text-align: center; padding: 30px 0; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .avatar { width: 70px; height: 70px; background: #222; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 2em; border: 2px solid var(--main); }
        
        h2 { color: var(--main); font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; }
        
        .order-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; transition: 0.3s; }
        .order-id { font-weight: bold; color: var(--main); font-family: monospace; }
        
        /* Tracking Info */
        .tracking-status { margin-top: 15px; padding-top: 15px; border-top: 1px solid #333; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 6px; font-size: 0.7em; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        .processing { background: #444; color: #aaa; }
        .active-delivery { background: #28a745; color: white; box-shadow: 0 0 10px rgba(40, 167,  green, 0.3); }
        
        .time-info { font-size: 0.9em; line-height: 1.5; }
        .time-info b { color: var(--main); }

        /* Navigation Bar */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: flex; padding: 15px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-a { flex: 1; text-align: center; text-decoration: none; color: #555; font-size: 0.8em; }
        .active { color: var(--main); }
    </style>
</head>
<body>

    <div class="header">
        <div class="avatar">👤</div>
        <div id="display-name" style="font-weight: bold; font-size: 1.2em;">Member</div>
        <div style="font-size: 0.8em; color: #666;">Verified Account</div>
    </div>

    <section>
        <h2>Orders & Live Tracking</h2>
        <div id="orders-container">
            <p style="text-align:center; color:#444; margin-top:40px;">No active orders.</p>
        </div>
    </section>

    <nav class="nav">
        <a href="index.html" class="nav-a">🏠<br>HOME</a>
        <a href="order.html" class="nav-a">🛒<br>CART</a>
        <a href="profile.html" class="nav-a active">👤<br>PROFILE</a>
    </nav>

<script>
    // --- KONFIGURACJA FIREBASE ---
    const firebaseConfig = { databaseURL: "https://alexander3d-923d0-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function initProfile() {
        const container = document.getElementById('orders-container');
        
        // 1. Pobieramy zamówienia zapisane w przeglądarce klienta
        const myOrders = JSON.parse(localStorage.getItem('my_orders')) || [];
        
        if (myOrders.length === 0) return;

        // Wyświetlamy imię z ostatniego zamówienia
        document.getElementById('display-name').innerText = myOrders[myOrders.length - 1].customer;

        container.innerHTML = ""; // Czyścimy loader

        // 2. Dla każdego zamówienia klienta, sprawdzamy status w Firebase w czasie rzeczywistym
        myOrders.reverse().forEach(order => {
            const orderElement = document.createElement('div');
            orderElement.className = 'order-card';
            orderElement.id = `order-${order.id}`;
            
            // Renderujemy szkielet karty
            orderElement.innerHTML = `
                <span class="order-id">#${order.id}</span>
                <div style="font-size:0.8em; color:#666; margin-top:5px;">Alexander 3D Order</div>
                <div id="track-${order.id}" class="tracking-status">
                    <span class="badge processing">Processing</span>
                    <div class="time-info">Checking delivery details...</div>
                </div>
            `;
            container.appendChild(orderElement);

            // 3. LIVE SYNC: Słuchamy zmian w bazie Firebase dla tego konkretnego Order ID
            db.ref('tracking/' + order.id).on('value', snap => {
                const liveData = snap.val();
                const trackDiv = document.getElementById(`track-${order.id}`);

                if (liveData) {
                    // Jeśli Pan (Admin) dodał dane o dostawie
                    trackDiv.innerHTML = `
                        <span class="badge active-delivery">Out for Delivery</span>
                        <div class="time-info">
                            Arrival: <b>${liveData.day}</b><br>
                            Time Slot: <b>${liveData.time}</b>
                        </div>
                    `;
                } else {
                    // Jeśli zamówienie jeszcze nie ma wpisanego trackingu
                    trackDiv.innerHTML = `
                        <span class="badge processing">Order Confirmed</span>
                        <div class="time-info" style="color:#777;">
                            Waiting for production slot...
                        </div>
                    `;
                }
            });
        });
    }

    window.onload = initProfile;
</script>

</body>
</html>
