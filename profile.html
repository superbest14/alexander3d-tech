<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; }
        .order-card { background: #1a1a1a; padding: 20px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #00d4ff; }
        .status { font-weight: bold; color: #00d4ff; }
    </style>
</head>
<body>
    <h1>My Orders</h1>
    <div id="orders-list"></div>

<script>
    const orders = JSON.parse(localStorage.getItem('orders')) || [];
    document.getElementById('orders-list').innerHTML = orders.map(o => `
        <div class="order-card">
            <h3>Order ID: ${o.id}</h3>
            <p>Items: ${o.items.join(', ')}</p>
            <p>Total: £${o.price}</p>
            <p>Status: <span class="status">${o.status}</span></p>
            <a href="track.html?id=${o.id}" style="color:white">Track Package ➔</a>
        </div>
    `).reverse().join('');
</script>
</body>
</html>
