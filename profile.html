<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Alexander 3D</title>
    <style>
        :root { --main: #00d4ff; --bg: #0b0b0b; --card: #161616; }
        body { font-family: sans-serif; background: var(--bg); color: white; padding: 20px; }
        .order-card { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .track-btn { background: var(--main); color: black; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; float: right; font-weight: bold; text-decoration: none; font-size: 0.8em; }
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #121212; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .tab-item { text-align: center; text-decoration: none; color: #888; font-size: 0.7em; flex: 1; }
    </style>
</head>
<body>

    <h1>My Profile</h1>
    <h3>Bought Items</h3>
    <div id="bought-list"></div>

    <nav class="tab-bar">
        <a href="index.html" class="tab-item">🏠<br>HOME</a>
        <a href="order.html" class="tab-item">🛒<br>CART</a>
        <a href="profile.html" class="tab-item" style="color:var(--main)">👤<br>PROFILE</a>
    </nav>

<script>
    async function loadOrders() {
        const container = document.getElementById('bought-list');
        try {
            // Pulling status from the global orders.json configured in admin
            const res = await fetch('orders.json');
            const orders = await res.json();

            container.innerHTML = orders.map(o => `
                <div class="order-card">
                    <a href="tracking.html?id=${o.id}" class="track-btn">TRACK PARCEL</a>
                    <strong>Order ID: ${o.id}</strong><br>
                    <span style="color:#888;">Status: ${o.status}</span>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = "<p>No orders found.</p>";
        }
    }
    loadOrders();
</script>
</body>
</html>
