<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Admin Alexander 3D</title>
<style>
body { background: #111; color: #00d4ff; font-family: sans-serif; padding: 20px; }
.form-box { background: #222; padding: 20px; border-radius: 15px; max-width: 500px; margin-bottom: 30px; }
input { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; }
#preview { width: 100%; height: 200px; border: 2px dashed #444; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; overflow: hidden; }
#preview img { width: 100%; height: 100%; object-fit: cover; }
.btn { background: #28a745; color: #fff; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; }
.product-item { border-bottom: 1px solid #333; padding: 10px; display: flex; justify-content: space-between; }
</style>
</head>
<body>
<h1>Panel Admina (Dodaj Produkt)</h1>

<div class="form-box">
<div id="preview">Click to upload photo (Vinted style)</div>
<input type="file" id="photoInput" accept="image/*" style="display:none">
<button onclick="document.getElementById('photoInput').click()" style="margin-bottom:10px;">WYBIERZ ZDJĘCIE</button>

<input type="text" id="pName" placeholder="Nazwa produktu (np. Drone Frame)">
<input type="number" id="pPrice" placeholder="Cena (£)">
<button class="btn" onclick="saveProduct()">DODAJ PRODUKT DO SKLEPU</button>
</div>

<h2>Twoje Produkty:</h2>
<div id="admin-list"></div>

<script>
let currentImage = "";

// Obsługa zdjęcia jak na Vinted
document.getElementById('photoInput').onchange = e => {
const reader = new FileReader();
reader.onload = () => {
currentImage = reader.result;
document.getElementById('preview').innerHTML = `<img src="${currentImage}">`;
};
reader.readAsDataURL(e.target.files[0]);
};

function saveProduct() {
const name = document.getElementById('pName').value;
const price = document.getElementById('pPrice').value;
if(!name || !price || !currentImage) return alert("Wypełnij wszystko!");

const products = JSON.parse(localStorage.getItem('products')) || [];
products.push({ name, price, image: currentImage, lastOrderId: "AT-"+Math.floor(1000+Math.random()*9000) });
localStorage.setItem('products', JSON.stringify(products));

alert("Dodano! Teraz odśwież stronę główną.");
location.reload();
}

function deleteProduct(index) {
const products = JSON.parse(localStorage.getItem('products')) || [];
products.splice(index, 1);
localStorage.setItem('products', JSON.stringify(products));
location.reload();
}

const products = JSON.parse(localStorage.getItem('products')) || [];
document.getElementById('admin-list').innerHTML = products.map((p, i) => `
<div class="product-item">
<span>${p.name} - £${p.price}</span>
<button onclick="deleteProduct(${i})" style="color:red; background:none; border:none;">Usuń</button>
</div>
`).join('');
</script>
</body>
</html>
