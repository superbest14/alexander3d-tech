<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Auto-Sync</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; }
        button { background: #00d4ff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Alexander 3D Sync</h2>
    <input type="password" id="token" placeholder="Paste GitHub Token Here">
    <input type="text" id="pName" placeholder="Product Name">
    <input type="number" id="pPrice" placeholder="Price £">
    <input type="file" id="pFile" accept="image/*">
    <button onclick="uploadToCloud()">PUSH TO ALL UK DEVICES</button>

    <script>
        let imgBase64 = "";
        document.getElementById('pFile').onchange = e => {
            const r = new FileReader();
            r.onload = () => imgBase64 = r.result;
            r.readAsDataURL(e.target.files[0]);
        };

        async function uploadToCloud() {
            const token = document.getElementById('token').value;
            const repo = "PanaNazwa/PanaRepo"; // Tu wpisać nazwę konta i repozytorium
            const path = "data.json";
            const url = `https://api.github.com/repos/${repo}/contents/${path}`;

            // 1. Pobierz starą zawartość
            const res = await fetch(url);
            const fileData = await res.json();
            let currentContent = JSON.parse(atob(fileData.content));

            // 2. Dodaj nowy produkt
            currentContent.push({
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                image: imgBase64
            });

            // 3. Wyślij nową wersję (Automatyczny Commit)
            await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Update Shop Data",
                    content: btoa(JSON.stringify(currentContent)),
                    sha: fileData.sha
                })
            });
            alert("Updated! Everyone in the UK can see it now.");
        }
    </script>
</body>
</html>
