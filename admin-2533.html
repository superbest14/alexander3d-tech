<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Alexander 3D | Management</title>
    <style>
        :root { --main: #00d4ff; --bg: #0b0b0b; --card: #1a1a1a; --danger: #ff4444; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .box { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--main); color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 10px; text-transform: uppercase; }
        .btn-del { background: var(--danger); color: white; margin-top: 10px; width: auto; padding: 5px 15px; }
        .status { padding: 10px; margin-top: 10px; border-radius: 8px; display: none; text-align: center; font-weight: bold; }
        .product-list-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PANEL ADMINA (Auto-Sync JSON)</h1>

        <div class="box">
            <h3>Konfiguracja</h3>
            <input type="password" id="ghToken" placeholder="Wklej nowy GitHub Token">
            <input type="text" id="ghRepo" placeholder="TwojaNazwaUzytkownika/NazwaRepo">
        </div>
        
        <div class="box">
            <h3>Dodaj Nowy Produkt</h3>
            <input type="text" id="pName" placeholder="Nazwa">
            <textarea id="pDesc" placeholder="Opis"></textarea>
            <input type="number" id="pPrice" placeholder="Cena £">
            <input type="number" id="pStock" placeholder="Ilość (Stock)">
            <input type="text" id="pColors" placeholder="Kolory (np. Black, Red, Silver)">
            <p>Zdjęcia:</p>
            <input type="file" id="pFiles" multiple accept="image/*">
            <button class="btn" onclick="publishProduct()">DODAJ I WYŚLIJ NA GITHUB</button>
            <div id="status" class="status"></div>
        </div>

        <div class="box">
            <h3>Zarządzaj Produktami (JSON)</h3>
            <button class="btn" style="background:#444; color:white;" onclick="fetchCurrentList()">POBIERZ AKTUALNĄ LISTĘ</button>
            <div id="admin-product-list"></div>
        </div>
    </div>

<script>
    let uploadedImages = [];
    let currentSha = ""; // Klucz SHA do edycji pliku na GitHubie

    document.getElementById('pFiles').onchange = e => {
        const files = e.target.files;
        uploadedImages = [];
        for(let f of files) {
            let reader = new FileReader();
            reader.onload = r => uploadedImages.push(r.target.result);
            reader.readAsDataURL(f);
        }
    };

    async function getFileDetails() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        const url = `https://api.github.com/repos/${repo}/contents/products.json`;
        
        const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
        if (!res.ok) return { sha: "", content: [] };
        
        const data = await res.json();
        return {
            sha: data.sha,
            content: JSON.parse(decodeURIComponent(escape(atob(data.content))))
        };
    }

    async function publishProduct() {
        const status = document.getElementById('status');
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;

        if(!token || !repo) return alert("Proszę Pana, brak tokenu lub nazwy repozytorium!");

        status.style.display = "block";
        status.innerText = "Łączenie z GitHub...";
        status.style.background = "#555";

        try {
            const { sha, content } = await getFileDetails();
            
            const newProduct = {
                id: Date.now(),
                name: document.getElementById('pName').value,
                description: document.getElementById('pDesc').value,
                price: document.getElementById('pPrice').value,
                stock: parseInt(document.getElementById('pStock').value) || 0,
                colors: document.getElementById('pColors').value.split(',').map(c => c.trim()),
                images: uploadedImages
            };

            content.push(newProduct);

            const putRes = await fetch(`https://api.github.com/repos/${repo}/contents/products.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `Update: Added ${newProduct.name}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
                    sha: sha
                })
            });

            if (putRes.ok) {
                status.style.background = "#28a745";
                status.innerText = "SUKCES! Produkt dodany globalnie.";
                fetchCurrentList(); // Odśwież listę
            }
        } catch (err) {
            status.style.background = "red";
            status.innerText = "BŁĄD: " + err.message;
        }
    }

    async function deleteProduct(productId) {
        if(!confirm("Czy na pewno usunąć ten produkt z bazy danych?")) return;
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;

        try {
            const { sha, content } = await getFileDetails();
            const filtered = content.filter(p => p.id !== productId);

            await fetch(`https://api.github.com/repos/${repo}/contents/products.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `Delete product ID: ${productId}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(filtered, null, 2)))),
                    sha: sha
                })
            });
            alert("Usunięto!");
            fetchCurrentList();
        } catch (e) { alert("Błąd usuwania."); }
    }

    async function fetchCurrentList() {
        const { content } = await getFileDetails();
        const listDiv = document.getElementById('admin-product-list');
        listDiv.innerHTML = content.map(p => `
            <div class="product-list-item">
                <img src="${p.images[0]}" class="preview-img">
                <div style="flex-grow:1; margin-left:15px;">
                    <b>${p.name}</b> | £${p.price} | Stock: ${p.stock}
                </div>
                <button class="btn btn-del" onclick="deleteProduct(${p.id})">USUŃ</button>
            </div>
        `).join('');
    }
</script>
</body>
</html>
