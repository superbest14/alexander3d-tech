<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Admin Alexander 3D</title>
    <style>
        body { background: #111; color: #00d4ff; font-family: sans-serif; padding: 20px; }
        .admin-section { background: #222; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; }
        button { background: #28a745; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <h1>ADMIN PANEL</h1>

    <div class="admin-section">
        <h3>Add New Product</h3>
        <input type="text" id="pName" placeholder="Product Name">
        <textarea id="pDesc" placeholder="Description"></textarea>
        <input type="number" id="pPrice" placeholder="Price £">
        <input type="text" id="pShip" placeholder="Shipping Price (0 = Free)">
        <input type="file" id="pFiles" multiple accept="image/*">
        <button onclick="addProduct()">PUBLISH PRODUCT</button>
    </div>

    <div class="admin-section">
        <h3>Update Order Status</h3>
        <input type="text" id="oid" placeholder="Order ID (e.g. AT-...)">
        <select id="ostatus">
            <option value="Manufacturing (Produkowanie)">Manufacturing</option>
            <option value="Packing (Pakowanie)">Packing</option>
            <option value="Shipped (Wysłane)">Shipped</option>
            <option value="In Transit (Kurier ma paczkę)">In Transit</option>
            <option value="Delayed (Opóźnienia - przyjdzie jutro)">Delayed</option>
            <option value="Delivered (Dostarczone)">Delivered</option>
        </select>
        <input type="text" id="otime" placeholder="Delivery time (e.g. Today 2:00 PM - 4:00 PM)">
        <button onclick="updateOrder()" style="background:#007bff">UPDATE TRACKING</button>
    </div>

<script>
    let images = [];
    document.getElementById('pFiles').onchange = e => {
        const files = e.target.files;
        for(let f of files) {
            let reader = new FileReader();
            reader.onload = r => images.push(r.target.result);
            reader.readAsDataURL(f);
        }
    };

    function addProduct() {
        let p = {
            name: document.getElementById('pName').value,
            description: document.getElementById('pDesc').value,
            price: document.getElementById('pPrice').value,
            shipping: document.getElementById('pShip').value,
            images: images,
            soldOut: false
        };
        let products = JSON.parse(localStorage.getItem('products')) || [];
        products.push(p);
        localStorage.setItem('products', JSON.stringify(products));
        alert("Product Added!");
    }

    function updateOrder() {
        let id = document.getElementById('oid').value;
        let orders = JSON.parse(localStorage.getItem('orders')) || [];
        let o = orders.find(x => x.id === id);
        if(o) {
            o.status = document.getElementById('ostatus').value;
            o.deliveryTime = document.getElementById('otime').value;
            localStorage.setItem('orders', JSON.stringify(orders));
            alert("Status Updated!");
        }
    }
</script>
</body>
</html>
