<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Easy Edit</title>
    <style>
        :root { --main: #00d4ff; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .box { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; }
        .btn { background: var(--main); color: black; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 10px; }
        #output { background: #000; color: #0f0; padding: 15px; border: 1px solid #0f0; white-space: pre-wrap; font-family: monospace; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Alexander 3D Admin</h1>

    <div class="box">
        <h3>1. Create Product Code</h3>
        <input type="text" id="pName" placeholder="Product Name">
        <input type="number" id="pPrice" placeholder="Price £">
        <input type="text" id="pColors" placeholder="Colors (e.g. Red, Black)">
        <p>Photos (Select Files):</p>
        <input type="file" id="pFiles" multiple accept="image/*">
        <button class="btn" onclick="generateCode()">GENERATE PRODUCT CODE</button>
    </div>

    <div class="box">
        <h3>2. Delivery Tracking Update</h3>
        <input type="text" id="orderID" placeholder="Order ID">
        <select id="day">
            <option value="Today">Today</option>
            <option value="Tomorrow">Tomorrow</option>
        </select>
        <p>Delivery Hour Slot:</p>
        <div style="display:flex; gap:10px;">
            <input type="time" id="timeFrom"> to <input type="time" id="timeTo">
        </div>
        <button class="btn" style="background:#28a745; color:white;" onclick="generateTracking()">GENERATE TRACKING CODE</button>
    </div>

    <div id="output"></div>

    <script>
        let images = [];
        document.getElementById('pFiles').onchange = e => {
            images = [];
            for(let f of e.target.files){
                let r = new FileReader();
                r.onload = res => images.push(res.target.result);
                r.readAsDataURL(f);
            }
        };

        function generateCode() {
            const code = `{ name: "${document.getElementById('pName').value}", price: "${document.getElementById('pPrice').value}", colors: ["${document.getElementById('pColors').value}"], images: ["${images[0]}"] },`;
            const out = document.getElementById('output');
            out.style.display = "block";
            out.innerText = "COPY THIS TO THE 'PRODUCTS' ARRAY IN INDEX.HTML:\n\n" + code;
        }

        function generateTracking() {
            const code = `{ id: "${document.getElementById('orderID').value}", day: "${document.getElementById('day').value}", time: "${document.getElementById('timeFrom').value} - ${document.getElementById('timeTo').value}" },`;
            const out = document.getElementById('output');
            out.style.display = "block";
            out.innerText = "COPY THIS TO THE 'ORDERS' ARRAY IN INDEX.HTML:\n\n" + code;
        }
    </script>
</body>
</html>
