<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Alexander 3D | Auto-Sync</title>
    <style>
        :root { --main: #00d4ff; --bg: #0b0b0b; --card: #1a1a1a; }
        body { background: var(--bg); color: var(--main); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .box { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--main); color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 10px; }
        .status { padding: 10px; margin-top: 10px; border-radius: 8px; display: none; text-align: center; }
        .loader { display: none; color: white; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PANEL ADMINA (AUTO-SYNC)</h1>

        <div class="box">
            <h3>Ustawienia połączenia z GitHub</h3>
            <input type="password" id="ghToken" placeholder="Wklej tutaj swój GitHub Token (PAT)">
            <input type="text" id="ghRepo" placeholder="Twoja nazwa użytkownika/nazwa-repozytorium">
        </div>
        
        <div class="box">
            <h3>Dodaj Nowy Produkt</h3>
            <input type="text" id="pName" placeholder="Nazwa produktu">
            <textarea id="pDesc" placeholder="Opis"></textarea>
            <input type="number" id="pPrice" placeholder="Cena £">
            <input type="number" id="pStock" placeholder="Ilość (Stock)">
            <input type="text" id="pColors" placeholder="Kolory (np. Black, Red)">
            <input type="file" id="pFiles" multiple accept="image/*">
            
            <button class="btn" onclick="publishToGithub()">OPUBLIKUJ PRODUKT WSZĘDZIE</button>
            <div id="loader" class="loader">Wysyłanie do bazy danych... Proszę czekać...</div>
            <div id="status" class="status"></div>
        </div>
    </div>

<script>
    let uploadedImages = [];

    document.getElementById('pFiles').onchange = e => {
        const files = e.target.files;
        uploadedImages = [];
        for(let f of files) {
            let reader = new FileReader();
            reader.onload = r => uploadedImages.push(r.target.result);
            reader.readAsDataURL(f);
        }
    };

    async function publishToGithub() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        const statusDiv = document.getElementById('status');
        const loader = document.getElementById('loader');

        if(!token || !repo) return alert("Proszę Pana, muszę mieć token i nazwę repozytorium!");

        loader.style.display = "block";
        statusDiv.style.display = "none";

        try {
            const fileName = 'products.json';
            const url = `https://api.github.com/repos/${repo}/contents/${fileName}`;

            // 1. Pobierz obecną treść pliku i jego "sha" (wymagane przez GitHub do edycji)
            let sha = "";
            let currentProducts = [];
            
            const getRes = await fetch(url, {
                headers: { 'Authorization': `token ${token}` }
            });

            if (getRes.ok) {
                const getData = await getRes.json();
                sha = getData.sha;
                currentProducts = JSON.parse(atob(getData.content));
            }

            // 2. Dodaj nowy produkt
            const newProduct = {
                id: Date.now(),
                name: document.getElementById('pName').value,
                description: document.getElementById('pDesc').value,
                price: document.getElementById('pPrice').value,
                stock: parseInt(document.getElementById('pStock').value),
                colors: document.getElementById('pColors').value.split(',').map(c => c.trim()),
                images: uploadedImages
            };

            currentProducts.push(newProduct);

            // 3. Wyślij zaktualizowany plik z powrotem na GitHub
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: `Dodano produkt: ${newProduct.name}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(currentProducts, null, 2)))),
                    sha: sha
                })
            });

            if (putRes.ok) {
                statusDiv.style.display = "block";
                statusDiv.style.background = "#28a745";
                statusDiv.style.color = "white";
                statusDiv.innerText = "SUKCES! Produkt jest już widoczny na świecie.";
            } else {
                throw new Error("Błąd podczas wysyłania.");
            }

        } catch (err) {
            statusDiv.style.display = "block";
            statusDiv.style.background = "#ff4444";
            statusDiv.style.color = "white";
            statusDiv.innerText = "BŁĄD: " + err.message;
        } finally {
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
