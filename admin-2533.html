<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Alexander 3D | Easy Manager</title>
    <style>
        :root { --main: #00d4ff; --bg: #0b0b0b; --card: #1a1a1a; --danger: #ff4444; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; padding: 10px; }
        .box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--main); color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 10px; text-transform: uppercase; }
        .btn-del { background: var(--danger); color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; border: none; }
        .status-msg { padding: 10px; margin-top: 10px; border-radius: 8px; display: none; text-align: center; }
        .prod-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
        .preview-img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Panel Sterowania Alexander 3D</h1>

    <div class="box">
        <h3>1. Dodaj Produkt (Kolory i Ilość)</h3>
        <input type="text" id="pName" placeholder="Nazwa produktu">
        <input type="number" id="pPrice" placeholder="Cena £">
        <input type="number" id="pStock" placeholder="Ilość na stanie">
        <input type="text" id="pColors" placeholder="Kolory (np. Black, Red, Carbon)">
        <textarea id="pDesc" placeholder="Opis produktu"></textarea>
        <input type="file" id="pFiles" multiple accept="image/*">
        <button class="btn" onclick="publishProduct()">Opublikuj Sklep</button>
        <div id="status" class="status-msg"></div>
    </div>

    <div class="box">
        <h3>2. Status Paczki (Tracking)</h3>
        <input type="text" id="trackID" placeholder="Wpisz ID Zamówienia (np. AT-1234)">
        <select id="newStatus">
            <option value="In Production">W produkcji</option>
            <option value="Quality Check">Kontrola Jakości</option>
            <option value="Shipped">Wysłano / Shipped</option>
            <option value="Delivered">Dostarczono</option>
        </select>
        <button class="btn" style="background:#28a745; color:white;" onclick="updateOrder()">Aktualizuj Status</button>
    </div>

    <div class="box">
        <h3>3. Zarządzaj Produktami (Usuwanie)</h3>
        <button class="btn" style="background:#444; color:white;" onclick="fetchList()">Odśwież Listę Produktów</button>
        <div id="admin-product-list"></div>
    </div>

<script>
    // --- KONFIGURACJA (Wpisz to raz i zapomnij) ---
    const CONFIG = {
        token: "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", // Wklej tutaj swój token (ten który wygenerowałeś)
        repo: "superbest14/alexander3d-tech"    // Wklej tutaj np. "Alexander/Sklep"
    };
    // ----------------------------------------------

    let uploadedImages = [];
    document.getElementById('pFiles').onchange = e => {
        const files = e.target.files;
        uploadedImages = [];
        for(let f of files) {
            let reader = new FileReader();
            reader.onload = r => uploadedImages.push(r.target.result);
            reader.readAsDataURL(f);
        }
    };

    async function getGHFile(path) {
        const url = `https://api.github.com/repos/${CONFIG.repo}/contents/${path}`;
        const res = await fetch(url, { headers: { 'Authorization': `token ${CONFIG.token}` } });
        if (!res.ok) return { sha: "", content: [] };
        const data = await res.json();
        return { sha: data.sha, content: JSON.parse(decodeURIComponent(escape(atob(data.content)))) };
    }

    async function saveToGH(path, content, sha, msg) {
        await fetch(`https://api.github.com/repos/${CONFIG.repo}/contents/${path}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${CONFIG.token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: msg,
                content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
                sha: sha
            })
        });
    }

    async function publishProduct() {
        const status = document.getElementById('status');
        status.style.display = "block"; status.innerText = "Wysyłanie...";
        try {
            const { sha, content } = await getGHFile('products.json');
            const newProd = {
                id: Date.now(),
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                stock: parseInt(document.getElementById('pStock').value),
                colors: document.getElementById('pColors').value.split(',').map(c => c.trim()),
                description: document.getElementById('pDesc').value,
                images: uploadedImages
            };
            content.push(newProd);
            await saveToGH('products.json', content, sha, "Add product");
            status.style.background = "green"; status.innerText = "GOTOWE!";
            fetchList();
        } catch (e) { status.style.background = "red"; status.innerText = "Błąd!"; }
    }

    async function updateOrder() {
        const id = document.getElementById('trackID').value;
        const status = document.getElementById('newStatus').value;
        if(!id) return alert("Podaj ID!");
        
        try {
            // Zakładamy, że trzymasz zamówienia w pliku orders.json na GitHubie
            const { sha, content } = await getGHFile('orders.json');
            const orderIdx = content.findIndex(o => o.id == id);
            if(orderIdx > -1) {
                content[orderIdx].status = status;
                await saveToGH('orders.json', content, sha, "Update status");
                alert("Status zaktualizowany!");
            } else { alert("Nie znaleziono takiego zamówienia!"); }
        } catch (e) { alert("Błąd aktualizacji statusu."); }
    }

    async function deleteProd(id) {
        if(!confirm("Usunąć produkt?")) return;
        const { sha, content } = await getGHFile('products.json');
        const filtered = content.filter(p => p.id !== id);
        await saveToGH('products.json', filtered, sha, "Delete product");
        fetchList();
    }

    async function fetchList() {
        const { content } = await getGHFile('products.json');
        document.getElementById('admin-product-list').innerHTML = content.map(p => `
            <div class="prod-item">
                <img src="${p.images[0]}" class="preview-img">
                <div style="flex:1; margin-left:10px;">${p.name} (£${p.price})</div>
                <button class="btn-del" onclick="deleteProd(${p.id})">USUŃ</button>
            </div>
        `).join('');
    }
</script>
</body>
</html>
