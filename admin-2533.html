<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Alexander 3D Tech</title>
    <style>
        :root { --main: #00d4ff; --bg: #0b0b0b; --card: #1a1a1a; --danger: #ff4444; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .box { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; margin-bottom: 25px; }
        h2 { color: var(--main); border-bottom: 1px solid #333; padding-bottom: 10px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--main); color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 10px; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: #00b8e6; box-shadow: 0 0 15px var(--main); }
        .btn-red { background: var(--danger); color: white; margin-top: 10px; width: auto; padding: 5px 15px; }
        .status-log { padding: 10px; margin-top: 10px; border-radius: 8px; display: none; text-align: center; font-weight: bold; }
        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
        .img-pre { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Alexander 3D - Global Admin</h1>

        <div class="box">
            <h2>1. GitHub Connection</h2>
            <input type="password" id="ghToken" placeholder="GitHub Personal Access Token (PAT)">
            <input type="text" id="ghRepo" placeholder="Username/Repository (e.g., Alexander/Shop)">
        </div>
        
        <div class="box">
            <h2>2. Inventory Management</h2>
            <input type="text" id="pName" placeholder="Product Name">
            <input type="number" id="pPrice" placeholder="Price £">
            <input type="number" id="pStock" placeholder="Stock Quantity">
            <input type="text" id="pColors" placeholder="Available Colors (comma separated: Black, Silver, Red)">
            <textarea id="pDesc" placeholder="Product Description"></textarea>
            <input type="file" id="pFiles" multiple accept="image/*">
            <button class="btn" onclick="uploadProduct()">Publish Product Globally</button>
            <div id="status" class="status-log"></div>
        </div>

        <div class="box">
            <h2>3. Order Tracking Updates</h2>
            <input type="text" id="orderID" placeholder="Order ID (e.g., AT-5592)">
            <select id="orderStatus">
                <option value="Manufacturing">Manufacturing</option>
                <option value="Quality Check">Quality Check</option>
                <option value="Packed">Packed & Ready</option>
                <option value="Shipped">Shipped</option>
                <option value="Delivered">Delivered</option>
            </select>
            <button class="btn" style="background:#28a745; color:white;" onclick="updateOrderStatus()">Update Delivery Status</button>
        </div>

        <div class="box">
            <h2>4. Current Inventory (Remove Items)</h2>
            <button class="btn" style="background:#444; color:white;" onclick="fetchList()">Refresh Inventory List</button>
            <div id="inventory-list"></div>
        </div>
    </div>

<script>
    let imagesBase64 = [];
    document.getElementById('pFiles').onchange = e => {
        imagesBase64 = [];
        for(let file of e.target.files) {
            let reader = new FileReader();
            reader.onload = r => imagesBase64.push(r.target.result);
            reader.readAsDataURL(file);
        }
    };

    async function getGHData(file) {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        const res = await fetch(`https://api.github.com/repos/${repo}/contents/${file}`, {
            headers: { 'Authorization': `token ${token}` }
        });
        if (!res.ok) return { sha: "", content: [] };
        const data = await res.json();
        return { sha: data.sha, content: JSON.parse(decodeURIComponent(escape(atob(data.content)))) };
    }

    async function pushToGH(file, content, sha, msg) {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        return fetch(`https://api.github.com/repos/${repo}/contents/${file}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: msg,
                content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
                sha: sha
            })
        });
    }

    async function uploadProduct() {
        const log = document.getElementById('status');
        log.style.display = "block"; log.innerText = "Syncing with GitHub...";
        try {
            const { sha, content } = await getGHData('products.json');
            const product = {
                id: Date.now(),
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                stock: parseInt(document.getElementById('pStock').value),
                colors: document.getElementById('pColors').value.split(',').map(c => c.trim()),
                description: document.getElementById('pDesc').value,
                images: imagesBase64
            };
            content.push(product);
            await pushToGH('products.json', content, sha, "Add " + product.name);
            log.style.background = "green"; log.innerText = "SUCCESS: Product Live!";
            fetchList();
        } catch (e) { log.style.background = "red"; log.innerText = "Error!"; }
    }

    async function updateOrderStatus() {
        const id = document.getElementById('orderID').value;
        const status = document.getElementById('orderStatus').value;
        const { sha, content } = await getGHData('orders.json');
        const idx = content.findIndex(o => o.id == id);
        if(idx > -1) {
            content[idx].status = status;
            await pushToGH('orders.json', content, sha, "Update Status " + id);
            alert("Tracking Updated!");
        } else {
            // Create new order entry if ID doesn't exist
            content.push({ id: id, status: status });
            await pushToGH('orders.json', content, sha, "New Order Status " + id);
            alert("New Tracking ID Created!");
        }
    }

    async function deleteProduct(id) {
        if(!confirm("Remove this item?")) return;
        const { sha, content } = await getGHData('products.json');
        const filtered = content.filter(p => p.id !== id);
        await pushToGH('products.json', filtered, sha, "Remove item");
        fetchList();
    }

    async function fetchList() {
        const { content } = await getGHData('products.json');
        document.getElementById('inventory-list').innerHTML = content.map(p => `
            <div class="item-row">
                <img src="${p.images[0]}" class="img-pre">
                <div style="flex:1; margin-left:15px;">${p.name} - £${p.price}</div>
                <button class="btn-red" onclick="deleteProduct(${p.id})">DELETE</button>
            </div>
        `).join('');
    }
</script>
</body>
</html>
