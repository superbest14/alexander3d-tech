<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Details</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; }
        .btn-buy { background: #00d4ff; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        select, input { background: #222; color: white; border: 1px solid #444; padding: 10px; width: 100%; border-radius: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div id="product-details"></div>
<script>
    const id = new URLSearchParams(window.location.search).get('id');
    
    async function load() {
        const res = await fetch('products.json');
        const products = await res.json();
        const p = products[id];

        document.getElementById('product-details').innerHTML = `
            <img src="${p.images[0]}" style="width:100%; border-radius:15px;">
            <h1>${p.name}</h1>
            <div style="font-size:2em; color:#00d4ff">£${p.price}</div>
            
            <p>Select Color:</p>
            <select id="selectedColor">
                ${p.colors.map(c => `<option value="${c}">${c}</option>`).join('')}
            </select>

            <p>Quantity (Max ${p.stock}):</p>
            <input type="number" id="selectedQty" value="1" min="1" max="${p.stock}">

            <button class="btn-buy" onclick="addToCart()">ADD TO CART</button>
        `;
        window.currentProduct = p;
    }

    function addToCart() {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const color = document.getElementById('selectedColor').value;
        const qty = document.getElementById('selectedQty').value;
        
        cart.push({
            ...window.currentProduct,
            chosenColor: color,
            chosenQty: qty,
            cartId: Date.now()
        });
        
        localStorage.setItem('cart', JSON.stringify(cart));
        alert("Added to cart, Proszę Pana!");
    }
    load();
</script>
</body>
</html>
