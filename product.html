<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <style>
        :root { --main: #00d4ff; --bg: #0b0b0b; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; padding-bottom: 100px; }
        .main-img { width: 100%; border-radius: 15px; border: 1px solid #333; margin-bottom: 15px; }
        .price { font-size: 2em; color: var(--main); font-weight: bold; margin: 15px 0; }
        /* Kontener na przyciski obok siebie */
        .btn-container { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; }
        .btn-cart { background: #333; color: white; border: 1px solid var(--main); }
        .btn-buy { background: var(--main); color: black; }
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #121212; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .tab-item { text-align: center; text-decoration: none; color: #888; font-size: 0.75em; flex: 1; }
        .tab-icon { font-size: 1.8em; display: block; }
    </style>
</head>
<body>
    <div id="content"></div>
    <nav class="tab-bar">
        <a href="index.html" class="tab-item"><span class="tab-icon">🏠</span>HOME</a>
        <a href="order.html" class="tab-item"><span class="tab-icon">🛒</span>CART</a>
        <a href="profile.html" class="tab-item"><span class="tab-icon">👤</span>PROFILE</a>
    </nav>
<script>
    const id = new URLSearchParams(window.location.search).get('id');
    const products = JSON.parse(localStorage.getItem('products')) || [];
    const p = products[id];

    if(p) {
        document.getElementById('content').innerHTML = `
            <img class="main-img" src="${p.images[0]}">
            <h1>${p.name}</h1>
            <p style="color:#aaa">${p.description || ''}</p>
            <div class="price">£${p.price}</div>
            <div class="btn-container">
                <button class="btn btn-cart" onclick="addToCart()">ADD TO CART</button>
                <button class="btn btn-buy" onclick="buyNow()">BUY NOW</button>
            </div>
        `;
    }

    function addToCart() {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push(p);
        localStorage.setItem('cart', JSON.stringify(cart));
        alert("Added to Cart, Sir!");
    }

    function buyNow() {
        addToCart();
        window.location.href = 'order.html';
    }
</script>
</body>
</html>
