<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alexander 3D Admin</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; }
        .box { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; }
        .btn { background: #00d4ff; color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #result { background: #000; color: #0f0; padding: 15px; border: 1px solid #0f0; display: none; margin-top: 10px; font-family: monospace; font-size: 11px; word-break: break-all; }
    </style>
</head>
<body>
    <h2>Product & Tracking Generator</h2>

    <div class="box">
        <h3>1. New Product</h3>
        <input type="text" id="pN" placeholder="Name">
        <input type="number" id="pP" placeholder="Price £">
        <input type="file" id="pF" accept="image/*">
        <button class="btn" onclick="genP()">GENERATE PRODUCT LINE</button>
    </div>

    <div class="box">
        <h3>2. Delivery Status</h3>
        <input type="text" id="oID" placeholder="Order ID">
        <select id="oD">
            <option value="Today">Today</option>
            <option value="Tomorrow">Tomorrow</option>
        </select>
        Between <input type="time" id="t1"> and <input type="time" id="t2">
        <button class="btn" style="background:#28a745; color:white;" onclick="genT()">GENERATE TRACKING LINE</button>
    </div>

    <div id="result"></div>

<script>
    let img = "";
    document.getElementById('pF').onchange = e => {
        let r = new FileReader();
        r.onload = res => img = res.target.result;
        r.readAsDataURL(e.target.files[0]);
    };

    function genP() {
        const line = `{ n: "${document.getElementById('pN').value}", p: "${document.getElementById('pP').value}", img: "${img}" },`;
        show(line);
    }

    function genT() {
        const line = `{ id: "${document.getElementById('oID').value}", day: "${document.getElementById('oD').value}", time: "${document.getElementById('t1').value} - ${document.getElementById('t2').value}" },`;
        show(line);
    }

    function show(txt) {
        const r = document.getElementById('result');
        r.style.display = "block";
        r.innerText = "https://console.firebase.google.com/u/1/project/alexander3d-923d0/database/alexander3d-923d0-default-rtdb/data/~2F" + txt;
    }
</script>
</body>
</html>
