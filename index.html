<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexander 3D Tech</title>
    <style>
        :root { --main: #00d4ff; --bg: #0b0b0b; --card: #161616; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .hero { text-align: center; padding: 40px; border-bottom: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: var(--card); border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-info { padding: 10px; }
        .price { color: var(--main); font-weight: bold; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { flex: 1; text-align: center; text-decoration: none; color: #777; font-size: 0.8em; }
        .active { color: var(--main); }
    </style>
</head>
<body>

    <div class="hero">
        <h1 style="color:var(--main); letter-spacing:3px;">ALEXANDER 3D</h1>
    </div>

    <div class="grid" id="product-grid"></div>

    <nav class="nav">
        <a href="#" class="nav-item active">🏠<br>HOME</a>
        <a href="order.html" class="nav-item">🛒<br>CART</a>
        <a href="profile.html" class="nav-item">👤<br>PROFILE</a>
    </nav>

    <script>
        // --- DATA SECTION (EASY TO EDIT) ---
        // Just paste new lines here from the Admin Panel
        const PRODUCTS = [
            // Example: { name: "Sample", price: "20", colors: ["Red"], images: ["data:image..."] },
        ];

        const ORDERS = [
            // Example: { id: "AT-1234", day: "Tomorrow", time: "14:00 - 16:00" },
        ];
        // ------------------------------------

        function loadProducts() {
            const grid = document.getElementById('product-grid');
            if(PRODUCTS.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/3; text-align:center;'>Welcome! New products coming soon.</p>";
                return;
            }
            grid.innerHTML = PRODUCTS.map((p, i) => `
                <div class="card" onclick="location.href='product.html?id=${i}'">
                    <img src="${p.images[0]}">
                    <div class="card-info">
                        <strong>${p.name}</strong><br>
                        <span class="price">£${p.price}</span>
                    </div>
                </div>
            `).join('');
        }
        window.onload = loadProducts;
    </script>
</body>
</html>
