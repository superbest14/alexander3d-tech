<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexander 3D Tech</title>
    <style>
        :root { --main: #00d4ff; --bg: #0b0b0b; --card: #161616; --text: #eee; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--main); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-info { padding: 15px; }
        .price { font-size: 1.5em; color: var(--main); font-weight: bold; }
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #121212; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .tab-item { text-align: center; text-decoration: none; color: #888; font-size: 0.75em; flex: 1; }
        .tab-item.active { color: var(--main); }
    </style>
</head>
<body>
    <div style="text-align:center; padding: 30px;">
        <h1 style="color:var(--main); letter-spacing:3px;">ALEXANDER 3D</h1>
    </div>
    
    <div class="grid" id="main-grid"></div>

    <nav class="tab-bar">
        <a href="index.html" class="tab-item active">🏠<br>HOME</a>
        <a href="order.html" class="tab-item">🛒<br>CART</a>
        <a href="profile.html" class="tab-item">👤<br>PROFILE</a>
    </nav>

<script>
    async function loadGlobalProducts() {
        try {
            // POBIERANIE Z PLIKU JSON NA GITHUBIE
            const response = await fetch('products.json');
            const products = await response.json();
            const grid = document.getElementById('main-grid');
            grid.innerHTML = products.map((p, i) => `
                <div class="card" onclick="window.location.href='product.html?id=${i}'">
                    <img src="${p.images[0]}">
                    <div class="card-info">
                        <strong>${p.name}</strong>
                        <div class="price">£${p.price}</div>
                        <div style="font-size:0.8em; color:#666">Available: ${p.stock > 0 ? p.stock + ' pcs' : 'SOLD OUT'}</div>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            console.error("Błąd ładowania JSON. Upewnij się, że plik products.json jest na GitHubie.");
        }
    }
    loadGlobalProducts();
</script>
</body>
</html>
