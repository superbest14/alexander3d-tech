<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexander 3D Tech | Home</title>
    <style>
        :root { --main: #00d4ff; --bg: #0b0b0b; --card: #161616; --text: #eee; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        
        /* Header */
        .hero { text-align: center; padding: 60px 20px; background: linear-gradient(180deg, #111, var(--bg)); }
        .hero h1 { margin: 0; font-size: 2.5em; letter-spacing: 4px; color: var(--main); text-shadow: 0 0 15px var(--main); }

        /* Product Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 25px; }
        .product-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #333; transition: 0.3s; cursor: pointer; }
        .product-card:hover { border-color: var(--main); transform: translateY(-5px); }
        .product-card img { width: 100%; height: 250px; object-fit: cover; }
        .info { padding: 20px; }
        .info h3 { margin: 0; font-size: 1.2em; }
        .price { font-size: 1.5em; color: var(--main); font-weight: bold; margin-top: 10px; }

        /* Bottom Nav */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #121212; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { text-align: center; text-decoration: none; color: #777; font-size: 0.75em; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--main); }
        .nav-icon { font-size: 1.8em; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>ALEXANDER 3D</h1>
        <p style="color:#555;">Mechanical Design & Prototyping</p>
    </div>

    <div class="grid" id="global-grid">
        <p style="text-align:center; width:100%; color:#444;">Syncing Inventory...</p>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item active"><span class="nav-icon">🏠</span>HOME</a>
        <a href="order.html" class="nav-item"><span class="nav-icon">🛒</span>CART</a>
        <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span>PROFILE</a>
    </nav>

<script>
    async function fetchProducts() {
        const grid = document.getElementById('global-grid');
        try {
            // Fetching products.json from your server/GitHub
            const response = await fetch('products.json');
            if (!response.ok) throw new Error();
            const products = await response.json();

            if (products.length === 0) {
                grid.innerHTML = "<p style='text-align:center; width:100%;'>No items available.</p>";
                return;
            }

            grid.innerHTML = products.map((p, i) => `
                <div class="product-card" onclick="window.location.href='product.html?id=${i}'">
                    <img src="${p.images[0]}">
                    <div class="info">
                        <h3>${p.name}</h3>
                        <div style="font-size:0.8em; color:#666; margin: 5px 0;">${p.colors.join(' | ')}</div>
                        <div class="price">£${p.price}</div>
                        <div style="font-size:0.7em; color:${p.stock > 0 ? '#28a745' : 'red'};">
                            ${p.stock > 0 ? 'In Stock: ' + p.stock : 'Out of Stock'}
                        </div>
                    </div>
                </div>
            `).join('');

        } catch (e) {
            grid.innerHTML = "<p style='text-align:center; width:100%; color:red;'>Database Error. Check GitHub.</p>";
        }
    }
    window.onload = fetchProducts;
</script>
</body>
</html>
