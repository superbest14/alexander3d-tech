<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexander 3D Tech | Store</title>
<style>
:root { --main: #00d4ff; --bg: #0b0b0b; --card: #161616; --text: #eee; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
.nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main); padding-bottom: 10px; margin-bottom: 30px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.product-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #333; transition: 0.3s; position: relative; }
.product-card img { width: 100%; height: 250px; object-fit: cover; }
.info { padding: 15px; }
.price { font-size: 1.5em; color: var(--main); font-weight: bold; }
.buy-btn { background: var(--main); color: #000; border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
.track-link { display: block; margin-top: 10px; color: #888; text-decoration: none; font-size: 0.9em; }
.track-link:hover { color: var(--main); }
#cart { position: fixed; bottom: 20px; right: 20px; background: #28a745; padding: 20px; border-radius: 15px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
</style>
</head>
<body>
<div class="nav">
<h1>ALEXANDER 3D</h1>
<div id="order-info"></div>
</div>

<div class="grid" id="product-list">
</div>

<div id="cart">
<h3 style="margin:0">Checkout</h3>
<p id="item-desc"></p>
<form action="https://www.paypal.com/cgi-bin/webscr" method="post">
<input type="hidden" name="cmd" value="_xclick">
<input type="hidden" name="business" value="yinyan86@gmail.com">
<input type="hidden" name="currency_code" value="GBP">
<input type="hidden" name="item_name" id="pp_name">
<input type="hidden" name="amount" id="pp_amount">
<button class="buy-btn" style="background:#fff">Pay via PayPal</button>
</form>
</div>

<script>
// Load products from LocalStorage (added via Admin)
function loadProducts() {
const products = JSON.parse(localStorage.getItem('products')) || [];
const container = document.getElementById('product-list');
container.innerHTML = products.map((p, index) => `
<div class="product-card">
<img src="${p.image}" alt="${p.name}">
<div class="info">
<div style="font-weight:bold">${p.name}</div>
<div class="price">£${p.price}</div>
<button class="buy-btn" onclick="openCart('${p.name}', ${p.price})">BUY NOW</button>
<a href="tracking.html?id=${p.lastOrderId || 'NONE'}" class="track-link">Track last order for this item</a>
</div>
</div>
`).join('');
}

function openCart(name, price) {
document.getElementById('cart').style.display = 'block';
document.getElementById('item-desc').innerText = name + " - £" + price;
document.getElementById('pp_name').value = name;
document.getElementById('pp_amount').value = price;
}

loadProducts();
</script>
</body>
</html>
