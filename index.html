<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexander 3D Tech | Home</title>
    <style>
        :root { --main: #00d4ff; --bg: #0b0b0b; --card: #161616; --text: #eee; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        nav { display: flex; justify-content: space-around; background: #111; padding: 20px; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; text-decoration: none; font-weight: bold; }
        .hero { text-align: center; padding: 40px; background: linear-gradient(to bottom, #111, #0b0b0b); }
        
        /* Shipping Table */
        .shipping-table { max-width: 800px; margin: 20px auto; border-collapse: collapse; width: 90%; background: #1a1a1a; border-radius: 10px; overflow: hidden; }
        .shipping-table th, .shipping-table td { padding: 15px; border: 1px solid #333; text-align: left; }
        .shipping-table th { background: var(--main); color: #000; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #333; transition: 0.3s; cursor: pointer; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 15px; }
        .status-tag { font-size: 0.8em; padding: 4px 8px; border-radius: 5px; float: right; }
        .sold-out { background: #ff4444; color: white; }
        .price { font-size: 1.4em; color: var(--main); font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">HOME</a>
        <a href="order.html">CART (<span id="cart-count">0</span>)</a>
        <a href="profile.html">PROFILE / BOUGHT</a>
    </nav>

    <div class="hero">
        <h1>ALEXANDER 3D TECH</h1>
        <p>Premium Engineering & Custom Parts</p>
    </div>

    <table class="shipping-table">
        <thead><tr><th>Region</th><th>Estimated Delivery</th><th>Price</th></tr></thead>
        <tbody>
            <tr><td>United Kingdom</td><td>1-3 Working Days</td><td>Free / Calculated</td></tr>
            <tr><td>Europe</td><td>5-7 Working Days</td><td>£9.99</td></tr>
        </tbody>
    </table>

    <div class="grid" id="main-grid"></div>

<script>
    function renderProducts() {
        const products = JSON.parse(localStorage.getItem('products')) || [];
        const grid = document.getElementById('main-grid');
        grid.innerHTML = products.map((p, i) => `
            <div class="card" onclick="window.location.href='product.html?id=${i}'">
                <img src="${p.images ? p.images[0] : ''}">
                <div class="card-info">
                    ${p.soldOut ? '<span class="status-tag sold-out">SOLD OUT</span>' : ''}
                    <div style="font-weight:bold">${p.name}</div>
                    <div class="price">£${p.price}</div>
                    <div style="font-size:0.8em; color:#888">Shipping: ${p.shipping === '0' ? 'FREE' : '£'+p.shipping}</div>
                </div>
            </div>
        `).join('');
    }
    document.getElementById('cart-count').innerText = (JSON.parse(localStorage.getItem('cart')) || []).length;
    renderProducts();
</script>
</body>
</html>
