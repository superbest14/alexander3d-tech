<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexander 3D Tech | Home</title>
    <style>
        :root { --main: #00d4ff; --bg: #0b0b0b; --card: #161616; --text: #eee; --nav-bg: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .tab-item { text-align: center; text-decoration: none; color: #888; font-size: 0.75em; flex: 1; }
        .tab-item.active { color: var(--main); }
        .tab-icon { font-size: 1.8em; display: block; margin-bottom: 3px; }
        .header { text-align: center; padding: 40px 20px; background: #111; border-bottom: 1px solid #333; }
        .header h1 { margin: 0; color: var(--main); letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #333; cursor: pointer; }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-info { padding: 15px; }
        .price { font-size: 1.5em; color: var(--main); font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><h1>ALEXANDER 3D TECH</h1><p>Engineering Excellence</p></div>
    <div class="grid" id="main-grid"></div>
    <nav class="tab-bar">
        <a href="index.html" class="tab-item active"><span class="tab-icon">🏠</span>HOME</a>
        <a href="order.html" class="tab-item"><span class="tab-icon">🛒</span>CART</a>
        <a href="profile.html" class="tab-item"><span class="tab-icon">👤</span>PROFILE</a>
    </nav>
<script>
    function render() {
        const products = JSON.parse(localStorage.getItem('products')) || [];
        document.getElementById('main-grid').innerHTML = products.map((p, i) => `
            <div class="card" onclick="window.location.href='product.html?id=${i}'">
                <img src="${p.images ? p.images[0] : ''}">
                <div class="card-info">
                    <strong>${p.name}</strong>
                    <div class="price">£${p.price}</div>
                </div>
            </div>`).join('');
    }
    render();
</script>
</body>
</html>
