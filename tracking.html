<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Order</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .status-box { border: 2px solid #00d4ff; padding: 25px; border-radius: 20px; background: #161616; margin-bottom: 20px; }
        .shipping-table { width: 100%; max-width: 400px; margin: 20px auto; border-collapse: collapse; background: #1a1a1a; text-align: left; }
        .shipping-table td { padding: 10px; border-bottom: 1px solid #333; font-size: 0.9em; }
        .header-row { color: #00d4ff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="status-box">
        <h2 id="stat">Order Found</h2>
        <p id="time" style="color:#00d4ff; font-weight:bold; font-size:1.2em;">Delivery: Pending</p>
        <p id="details">Manufacturing your 3D parts...</p>
    </div>

    <table class="shipping-table">
        <tr class="header-row"><td>Destination</td><td>Time</td></tr>
        <tr><td>United Kingdom</td><td>1-2 Days</td></tr>
        <tr><td>Europe</td><td>5-10 Days</td></tr>
    </table>
    
    <br><a href="profile.html" style="color:#888; text-decoration:none;">← Back to Profile</a>
</body>
</html>
