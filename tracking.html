<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tracking | Alexander 3D</title>
<style>
body { background: #0b0b0b; color: #00d4ff; font-family: sans-serif; text-align: center; padding: 50px; }
.box { border: 2px solid #00d4ff; padding: 40px; border-radius: 20px; display: inline-block; background: #161616; }
.status-dot { width: 20px; height: 20px; background: #28a745; border-radius: 50%; display: inline-block; margin-right: 10px; }
</style>
</head>
<body>
<div class="box">
<h1 id="order-title">Tracking Order</h1>
<div id="status-container">
<div style="font-size: 1.5em; margin-bottom: 20px;">
<span class="status-dot"></span> Status: <span id="status-text">In Production / Processing</span>
</div>
<p id="details">Your engineering part is being printed and verified.</p>
</div>
<hr border="1" color="#333">
<p>Order ID: <span id="oid" style="color:#fff"></span></p>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const orderId = urlParams.get('id');
document.getElementById('oid').innerText = orderId || "N/A";
</script>
</body>
</html>
